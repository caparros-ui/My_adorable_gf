        transcription: 'Accession 88.PA.54: Willem Kalf, Still Life with a Chinese Porcelain Jar, 1662. Gift/Purchase through the Getty Trust.',

    const TIMELINE_EVENTS = [
      { year: 1662, title: 'Painted in Amsterdam', subtitle: 'Willem Kalf Studio', recordId: 'rec-1662', location: 'Amsterdam', description: 'Created during the golden age of Dutch still life painting using rare pigments and imported porcelain props.' },
      { year: 1715, title: 'Van Vera Estate Inventory', subtitle: 'First Recorded Sale', recordId: 'rec-1715', location: 'Amsterdam', description: 'Appears in municipal probate inventory following the death of merchant Jan Jacobsz van Vera.' },
      { year: 1768, title: 'Paris Choiseul Auction', subtitle: 'Aristocratic French Market', recordId: 'rec-1768', location: 'Paris', description: 'Purchased by the Duc de Choiseul and engraved in the royal catalog of private galleries.' },

      { year: 1890, title: 'Berlin Museum Acquisition', subtitle: 'Wilhelm von Bode Directorate', recordId: 'rec-1890', location: 'Berlin', description: 'Entered public museum holdings during the expansion of European national collections.' },

    const NETWORK_NODES = [
      { id: 'n1', name: 'Willem Kalf', type: 'artist', year: 1662, connectionsCount: 12, details: 'Master Dutch Still Life Painter (1619–1693)' },
      { id: 'n2', name: 'Jan Jacobsz van Vera', type: 'collector', year: 1715, connectionsCount: 8, details: 'Amsterdam Merchant & Patron' },
      { id: 'n3', name: 'Duc de Choiseul', type: 'collector', year: 1768, connectionsCount: 24, details: 'Prime Minister of Louis XV, Avid Collector' },
      { id: 'n4', name: 'Pierre-François Basan', type: 'dealer', year: 1771, connectionsCount: 19, details: 'Parisian Engraver & Art Dealer' },
      { id: 'n5', name: 'Comte de Vaudreuil', type: 'collector', year: 1784, connectionsCount: 15, details: 'French Aristocrat & Royal Courtier' },
      { id: 'n6', name: 'Sir Francis Baring', type: 'collector', year: 1802, connectionsCount: 31, details: 'Founder of Baring Bank, London Collector' },
      { id: 'n7', name: 'Michael Bryan', type: 'dealer', year: 1802, connectionsCount: 27, details: 'London Art Dealer & Dictionary Author' },
      { id: 'n8', name: 'Edward Habich', type: 'collector', year: 1880, connectionsCount: 10, details: 'Cassel & Boston Art Collector' },
      { id: 'n9', name: 'Wilhelm von Bode', type: 'museum', year: 1890, connectionsCount: 45, details: 'Director, Berlin Royal Museums' },
      { id: 'n10', name: 'J. Paul Getty Museum', type: 'museum', year: 1988, connectionsCount: 120, details: 'Los Angeles Art Museum & Research Institute' },
    ];

    const NETWORK_LINKS = [
      { source: 'n1', target: 'n2', relationship: 'Direct Sale / Commission', year: 1662, value: 'fl. 150' },
      { source: 'n2', target: 'n3', relationship: 'Estate Auction Purchase', year: 1768, value: '3,400 livres' },
      { source: 'n3', target: 'n4', relationship: 'Catalog Publishing & Sale', year: 1771 },
      { source: 'n4', target: 'n5', relationship: 'Private Resale in Paris', year: 1784 },
      { source: 'n5', target: 'n7', relationship: 'Emigré Dispersion Transfer', year: 1795 },
      { source: 'n7', target: 'n6', relationship: 'Brokerage to London Collector', year: 1802, value: '450 Guineas' },
      { source: 'n6', target: 'n8', relationship: 'Private Estate Resale', year: 1850 },
      { source: 'n8', target: 'n9', relationship: 'Auction Acquisition for Berlin', year: 1890, value: '28,000 M' },
      { source: 'n9', target: 'n10', relationship: 'Post-War Deaccession / Exchange', year: 1988 },
    ];

    // PlaceholderImage Component
    function PlaceholderImage({ width = '100%', height = '100%', aspectRatio = '4/3', label = 'ARTWORK PLACEHOLDER', sublabel = '[ BLANK IMAGE ]', className = '', variant = 'canvas' }) {
      return (
        <div
          className={`relative overflow-hidden select-none border border-neutral-300 dark:border-neutral-800 bg-neutral-100 dark:bg-neutral-900/80 rounded-lg flex flex-col items-center justify-center p-6 text-center transition-all ${className}`}
          style={{ width, height, aspectRatio: aspectRatio !== 'custom' ? aspectRatio : undefined }}
        >
          <svg className="absolute inset-0 w-full h-full opacity-15 pointer-events-none stroke-current text-neutral-900 dark:text-neutral-100" xmlns="http://www.w3.org/2000/svg">
            <line x1="0" y1="0" x2="100%" y2="100%" strokeWidth="1" strokeDasharray="4 4" />
            <line x1="100%" y1="0" x2="0" y2="100%" strokeWidth="1" strokeDasharray="4 4" />
            <rect x="5%" y="5%" width="90%" height="90%" fill="none" strokeWidth="1" strokeDasharray="2 2" />
            <circle cx="50%" cy="50%" r="25%" fill="none" strokeWidth="1" />
          </svg>
          <div className="relative z-10 flex flex-col items-center justify-center space-y-2">
            <div className="w-10 h-10 rounded-full border border-neutral-400 dark:border-neutral-700 flex items-center justify-center bg-white/40 dark:bg-neutral-800/40 backdrop-blur-sm shadow-sm">
              <svg className="w-5 h-5 text-neutral-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
              </svg>
            </div>
            <span className="text-[11px] font-mono tracking-widest text-neutral-600 dark:text-neutral-400 uppercase font-semibold">{label}</span>
            <span className="text-[10px] font-mono text-neutral-400 dark:text-neutral-500">{sublabel}</span>
          </div>

    // Main App Component
    function App() {
      const [activeChapter, setActiveChapter] = useState(1);
      const [scrollProgress, setScrollProgress] = useState(0);
      const [isDarkMode, setIsDarkMode] = useState(true);
      const [soundEnabled, setSoundEnabled] = useState(false);
      const [isAboutOpen, setIsAboutOpen] = useState(false);
      const [isDrawerOpen, setIsDrawerOpen] = useState(false);
      const [activeLedgerRecord, setActiveLedgerRecord] = useState(null);

      const [selectedEventIndex, setSelectedEventIndex] = useState(0);
      const [zoomLevel, setZoomLevel] = useState(1);
      const [selectedNode, setSelectedNode] = useState(null);
      const [filterType, setFilterType] = useState('all');
      const [searchQuery, setSearchQuery] = useState('');
      const [selectedType, setSelectedType] = useState('ALL');

      const canvasRef = useRef(null);
      const [nodes, setNodes] = useState(NETWORK_NODES);

      useEffect(() => {
        if (isDarkMode) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      }, [isDarkMode]);

      useEffect(() => {
        const handleScroll = () => {
          const totalHeight = document.documentElement.scrollHeight - window.innerHeight;
          const currentScroll = window.scrollY;
          const progress = totalHeight > 0 ? (currentScroll / totalHeight) * 100 : 0;
          setScrollProgress(progress);

          const ch2El = document.getElementById('chapter-2');
          const ch3El = document.getElementById('chapter-3');

          if (ch3El && currentScroll >= ch3El.offsetTop - window.innerHeight / 2) setActiveChapter(3);
          else if (ch2El && currentScroll >= ch2El.offsetTop - window.innerHeight / 2) setActiveChapter(2);
          else setActiveChapter(1);
        };
        window.addEventListener('scroll', handleScroll, { passive: true });
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      // Canvas Network Logic
      useEffect(() => {
        const width = 800, height = 500, radius = Math.min(width, height) * 0.35;
        const initialized = NETWORK_NODES.map((n, i) => {
          const angle = (i / NETWORK_NODES.length) * Math.PI * 2;
          return { ...n, x: width / 2 + radius * Math.cos(angle), y: height / 2 + radius * Math.sin(angle), vx: (Math.random() - 0.5) * 0.4, vy: (Math.random() - 0.5) * 0.4 };
        });
        setNodes(initialized);
      }, []);

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        if (!ctx) return;
        let animationFrameId;

        const render = () => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          NETWORK_LINKS.forEach(link => {
            const sourceNode = nodes.find(n => n.id === link.source);
            const targetNode = nodes.find(n => n.id === link.target);
            if (sourceNode && targetNode) {
              const isHighlighted = selectedNode && (selectedNode.id === link.source || selectedNode.id === link.target);
              ctx.beginPath();
              ctx.moveTo(sourceNode.x, sourceNode.y);
              ctx.lineTo(targetNode.x, targetNode.y);
              ctx.strokeStyle = isHighlighted ? '#10b981' : 'rgba(156, 163, 175, 0.25)';
              ctx.lineWidth = isHighlighted ? 2.5 : 1;
              ctx.stroke();
            }
          });

          nodes.forEach(node => {
            if (filterType !== 'all' && node.type !== filterType) return;
            const isSelected = selectedNode && selectedNode.id === node.id;
            ctx.beginPath();
            ctx.arc(node.x, node.y, isSelected ? 16 : 8, 0, Math.PI * 2);
            ctx.fillStyle = isSelected ? 'rgba(16, 185, 129, 0.25)' : 'rgba(156, 163, 175, 0.15)';
            ctx.fill();

            ctx.beginPath();
            ctx.arc(node.x, node.y, isSelected ? 8 : 5, 0, Math.PI * 2);
            ctx.fillStyle = isSelected ? '#10b981' : node.type === 'artist' ? '#ef4444' : node.type === 'museum' ? '#3b82f6' : '#6b7280';
            ctx.fill();

            ctx.fillStyle = isSelected ? '#10b981' : '#6b7280';
            ctx.font = isSelected ? 'bold 11px monospace' : '10px monospace';
            ctx.fillText(node.name, node.x + 12, node.y + 4);
          });

          setNodes(prev => prev.map(n => {
            let nx = n.x + n.vx, ny = n.y + n.vy, nvx = n.vx, nvy = n.vy;
            if (nx < 40 || nx > canvas.width - 40) nvx *= -1;
            if (ny < 40 || ny > canvas.height - 40) nvy *= -1;
            return { ...n, x: nx, y: ny, vx: nvx, vy: nvy };
          }));

          animationFrameId = requestAnimationFrame(render);
        };
        render();
        return () => cancelAnimationFrame(animationFrameId);
      }, [nodes, selectedNode, filterType]);

      const handleCanvasClick = (e) => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const rect = canvas.getBoundingClientRect();
        const clickX = (e.clientX - rect.left) * (canvas.width / rect.width);
        const clickY = (e.clientY - rect.top) * (canvas.height / rect.height);
        const clicked = nodes.find(n => Math.hypot(n.x - clickX, n.y - clickY) <= 20);
        setSelectedNode(clicked || null);
      };

      const handleSelectChapter = (chId) => {
        setActiveChapter(chId);
        const el = document.getElementById(`chapter-${chId}`);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
      };

      const activeEvent = TIMELINE_EVENTS[selectedEventIndex];
      const activeRecord = PROVENANCE_RECORDS.find(r => r.id === activeEvent.recordId);

      const filteredRecords = PROVENANCE_RECORDS.filter(r => {
        const matchesSearch = r.owner.toLowerCase().includes(searchQuery.toLowerCase()) || r.location.toLowerCase().includes(searchQuery.toLowerCase()) || r.catalogId.toLowerCase().includes(searchQuery.toLowerCase());
        const matchesType = selectedType === 'ALL' || r.transactionType.toUpperCase() === selectedType;
        return matchesSearch && matchesType;
      });

      return (
        <div className="relative min-h-screen bg-neutral-50 dark:bg-neutral-950 text-neutral-900 dark:text-neutral-100 font-sans transition-colors duration-300">
          {/* Header */}
          <header className="fixed top-0 left-0 right-0 z-50 px-4 sm:px-8 py-4 flex items-center justify-between pointer-events-none">
            <div className="pointer-events-auto flex items-center space-x-3 bg-white/80 dark:bg-neutral-950/80 backdrop-blur-md px-4 py-2 rounded-full border border-neutral-200 dark:border-neutral-800 shadow-md">
              <span className="text-xs font-mono font-bold tracking-widest text-neutral-900 dark:text-neutral-100">GETTY</span>
              <span className="text-neutral-300 dark:text-neutral-700">|</span>
              <button onClick={() => setIsDrawerOpen(true)} className="flex items-center space-x-2 text-xs font-mono font-semibold text-neutral-800 dark:text-neutral-200">
                <span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse" />
                <span>TRACING ART</span>
              </button>
            </div>
            <div className="hidden md:flex pointer-events-auto items-center space-x-3 bg-white/70 dark:bg-neutral-900/70 backdrop-blur-md px-4 py-1.5 rounded-full border border-neutral-200 dark:border-neutral-800 text-xs font-mono">
              <span className="text-neutral-400">CH. 0{activeChapter}</span>
              <span className="text-neutral-300 dark:text-neutral-700">•</span>
              <span className="font-semibold text-neutral-800 dark:text-neutral-200">{CHAPTERS.find(c => c.id === activeChapter)?.title}</span>
            </div>
            <div className="pointer-events-auto flex items-center space-x-2">
              <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2.5 rounded-full bg-white/80 dark:bg-neutral-900/80 backdrop-blur-md border border-neutral-200 dark:border-neutral-800 text-xs font-mono">
                {isDarkMode ? '☀️' : '🌙'}
              </button>
              <button onClick={() => setIsAboutOpen(true)} className="px-4 py-2 rounded-full bg-neutral-900 dark:bg-neutral-100 text-white dark:text-neutral-900 text-xs font-mono font-semibold">
                ABOUT
              </button>
            </div>
          </header>

          {/* Dot Nav */}
          <aside className="fixed right-6 top-1/2 -translate-y-1/2 z-40 flex flex-col items-center space-y-4 pointer-events-auto">
            <div className="text-[10px] font-mono font-bold text-neutral-400 bg-white/70 dark:bg-neutral-900/70 px-2 py-1 rounded border border-neutral-200 dark:border-neutral-800">
              {Math.round(scrollProgress)}%
            </div>
            <div className="flex flex-col items-center space-y-3 py-3 px-2 bg-white/80 dark:bg-neutral-900/80 backdrop-blur-md rounded-full border border-neutral-200 dark:border-neutral-800 shadow-lg">
              {[1, 2, 3].map(chId => (
                <button key={chId} onClick={() => handleSelectChapter(chId)} className={`w-3.5 h-3.5 rounded-full transition-all ${activeChapter === chId ? 'bg-emerald-500 scale-125' : 'bg-neutral-300 dark:bg-neutral-700'}`} />
              ))}
            </div>
          </aside>

          {/* Chapter Drawer */}
          {isDrawerOpen && (
            <div className="fixed inset-0 z-50 flex bg-black/60 backdrop-blur-sm animate-fadeIn">
              <div className="w-full max-w-md bg-white dark:bg-neutral-900 h-full p-8 flex flex-col justify-between border-r border-neutral-200 dark:border-neutral-800 animate-slideRight">
                <div>
                  <div className="flex items-center justify-between pb-6 mb-6 border-b border-neutral-200 dark:border-neutral-800">
                    <h2 className="text-xl font-serif font-bold">Chapter Select</h2>
                    <button onClick={() => setIsDrawerOpen(false)} className="text-neutral-500 text-lg">✕</button>
                  </div>
                  <div className="space-y-4">
                    {CHAPTERS.map(ch => (
                      <button key={ch.id} onClick={() => { handleSelectChapter(ch.id); setIsDrawerOpen(false); }} className={`w-full text-left p-4 rounded-xl border transition-all ${activeChapter === ch.id ? 'border-emerald-500 bg-emerald-500/10' : 'border-neutral-200 dark:border-neutral-800'}`}>
                        <span className="text-xs font-mono font-bold text-neutral-400 block mb-1">CHAPTER 0{ch.id}</span>
                        <h3 className="font-serif font-bold text-base">{ch.title}</h3>
                        <p className="text-xs text-neutral-500 mt-1">{ch.subtitle}</p>
                      </button>
                    ))}
                  </div>
                </div>
              </div>
              <div className="flex-1" onClick={() => setIsDrawerOpen(false)} />
            </div>
          )}

          {/* About Modal */}
          {isAboutOpen && (
            <div className="fixed inset-0 z-50 flex justify-end bg-black/60 backdrop-blur-sm animate-fadeIn">
              <div className="w-full max-w-xl bg-white dark:bg-neutral-900 h-full p-8 flex flex-col justify-between border-l border-neutral-200 dark:border-neutral-800 animate-slideLeft">
                <div>
                  <div className="flex items-center justify-between pb-6 mb-6 border-b border-neutral-200 dark:border-neutral-800">
                    <h2 className="text-2xl font-serif font-bold">About Tracing Art</h2>
                    <button onClick={() => setIsAboutOpen(false)} className="text-neutral-500 text-lg">✕</button>
                  </div>
                  <p className="text-sm text-neutral-600 dark:text-neutral-300 leading-relaxed mb-6 font-sans">
                    Tracing Art transforms archival sales records into an interactive scrollytelling experience powered by the Getty Provenance Index® and Linked Open Data (LOD).
                  </p>
                  <div className="p-4 rounded-xl bg-neutral-100 dark:bg-neutral-800 text-xs font-mono space-y-2">
                    <span className="font-bold block">PROJECT METRICS</span>
                    <p>• 2,350,000+ Historical Sales & Inventory Records</p>
                    <p>• 480,000 Linked Artworks & Collectors</p>
                    <p>• 45,000 Archival Catalogs (1550–Present)</p>
                  </div>
                </div>
                <div className="pt-6 border-t border-neutral-200 dark:border-neutral-800 text-xs font-mono text-neutral-400">
                  © 2026 J. Paul Getty Trust
                </div>
              </div>
              <div className="flex-1" onClick={() => setIsAboutOpen(false)} />
            </div>
          )}

          {/* Ledger Lightbox */}
          {activeLedgerRecord && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-md animate-fadeIn">
              <div className="w-full max-w-2xl bg-white dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-800 rounded-2xl p-6 shadow-2xl relative">
                <button onClick={() => setActiveLedgerRecord(null)} className="absolute top-4 right-4 text-neutral-500 text-lg">✕</button>
                <span className="text-[10px] font-mono font-bold text-emerald-500 uppercase">RECORD #{activeLedgerRecord.catalogId}</span>
                <h3 className="text-xl font-serif font-bold mt-1 mb-4">{activeLedgerRecord.owner}</h3>
                <div className="grid grid-cols-2 gap-3 text-xs font-mono mb-4">
                  <div className="p-2.5 rounded bg-neutral-100 dark:bg-neutral-800"><span className="text-neutral-400 block text-[10px]">DATE</span>{activeLedgerRecord.dateString}</div>
                  <div className="p-2.5 rounded bg-neutral-100 dark:bg-neutral-800"><span className="text-neutral-400 block text-[10px]">LOCATION</span>{activeLedgerRecord.location}</div>
                  <div className="p-2.5 rounded bg-neutral-100 dark:bg-neutral-800"><span className="text-neutral-400 block text-[10px]">TYPE</span>{activeLedgerRecord.transactionType}</div>
                  <div className="p-2.5 rounded bg-neutral-100 dark:bg-neutral-800"><span className="text-neutral-400 block text-[10px]">PRICE</span><span className="text-emerald-500 font-bold">{activeLedgerRecord.price}</span></div>
                </div>
                <blockquote className="p-3.5 rounded bg-amber-500/10 border-l-2 border-amber-500 italic font-serif text-xs mb-4">
                  "{activeLedgerRecord.transcription}"
                </blockquote>
                <p className="text-xs text-neutral-500 font-sans">{activeLedgerRecord.notes}</p>
              </div>
            </div>
          )}

          {/* CHAPTER 1 */}
          <main className="relative z-10">
            <section id="chapter-1" className="pt-28 pb-20 px-4 sm:px-8 max-w-7xl mx-auto min-h-screen flex flex-col justify-between">
              <div className="text-center max-w-3xl mx-auto mb-12">
                <span className="text-xs font-mono font-bold text-emerald-600 dark:text-emerald-400 uppercase tracking-widest block mb-2">CHAPTER 01</span>
                <h1 className="text-4xl sm:text-5xl font-serif font-bold mb-4">Tracing a Painting Through Time</h1>
                <p className="text-sm sm:text-base text-neutral-600 dark:text-neutral-400 leading-relaxed font-sans">
                  Follow the journey of a single masterpiece across three centuries from an artist’s studio in 17th-century Amsterdam to museum galleries.
                </p>
              </div>

              <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 items-center">
                <div className="lg:col-span-7 flex flex-col items-center">
                  <div className="relative w-full aspect-[4/3] rounded-2xl overflow-hidden shadow-2xl border border-neutral-200 dark:border-neutral-800 bg-neutral-950 p-4">
                    <div className="w-full h-full flex items-center justify-center transition-transform duration-500" style={{ transform: `scale(${zoomLevel})` }}>
                      <PlaceholderImage label={`WILLEM KALF (1662) — ${activeEvent.title}`} sublabel={`[ BLANK IMAGE PLACEHOLDER • YEAR ${activeEvent.year} ]`} aspectRatio="custom" className="w-full h-full border-0 bg-transparent" />
                    </div>
                    <div className="absolute bottom-4 left-4 right-4 flex justify-between items-center">
                      <span className="bg-neutral-900/90 text-neutral-300 text-[11px] font-mono px-3 py-1 rounded-full border border-neutral-800">YEAR: <strong className="text-emerald-400">{activeEvent.year}</strong> • {activeEvent.location}</span>
                      <div className="flex space-x-1 bg-neutral-900/90 p-1 rounded-full border border-neutral-800 text-[10px] font-mono text-neutral-300">
                        <button onClick={() => setZoomLevel(z => Math.min(1.8, z + 0.2))} className="px-2 py-0.5">ZOOM +</button>
                        <button onClick={() => setZoomLevel(1)} className="px-2 py-0.5 text-neutral-400">RESET</button>
                        <button onClick={() => setZoomLevel(z => Math.max(1, z - 0.2))} className="px-2 py-0.5">ZOOM -</button>
                      </div>
                    </div>
                  </div>
                </div>

                <div className="lg:col-span-5">
                  <div className="bg-white dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-800 rounded-2xl p-6 sm:p-8 shadow-xl">
                    <span className="text-[10px] font-mono font-bold px-2 py-1 rounded bg-emerald-500/10 text-emerald-500 uppercase">MILESTONE {selectedEventIndex + 1} OF {TIMELINE_EVENTS.length}</span>
                    <h2 className="text-2xl font-serif font-bold mt-2 mb-1">{activeEvent.title}</h2>
                    <h3 className="text-xs font-mono text-neutral-400 mb-4">{activeEvent.subtitle}</h3>
                    <p className="text-xs sm:text-sm text-neutral-600 dark:text-neutral-300 leading-relaxed mb-6 font-sans">{activeEvent.description}</p>
                    {activeRecord && (
                      <button onClick={() => setActiveLedgerRecord(activeRecord)} className="w-full py-3 rounded-xl bg-neutral-900 dark:bg-neutral-100 text-white dark:text-neutral-900 text-xs font-mono font-semibold shadow-md">
                        INSPECT ARCHIVAL LEDGER
                      </button>
                    )}
                  </div>
                </div>
              </div>

              <div className="mt-8 bg-white/80 dark:bg-neutral-900/80 p-6 rounded-2xl border border-neutral-200 dark:border-neutral-800 shadow-lg">
                <span className="text-xs font-mono font-bold block mb-4">PROVENANCE CHRONOLOGY (1662 – 1988)</span>
                <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-6 gap-3">
                  {TIMELINE_EVENTS.map((ev, idx) => (
                    <button key={ev.year} onClick={() => setSelectedEventIndex(idx)} className={`p-3 rounded-xl border text-left font-mono text-xs ${idx === selectedEventIndex ? 'border-emerald-500 bg-emerald-500/10 font-bold text-emerald-500' : 'border-neutral-200 dark:border-neutral-800 text-neutral-500'}`}>
                      <div>{ev.year}</div>
                      <div className="text-[10px] truncate text-neutral-400 mt-0.5">{ev.location}</div>
                    </button>
                  ))}
                </div>
              </div>
            </section>

            {/* CHAPTER 2 */}
            <section id="chapter-2" className="pt-28 pb-20 px-4 sm:px-8 max-w-7xl mx-auto min-h-screen flex flex-col justify-between">
              <div className="text-center max-w-3xl mx-auto mb-10">
                <span className="text-xs font-mono font-bold text-emerald-600 dark:text-emerald-400 uppercase tracking-widest block mb-2">CHAPTER 02</span>
                <h1 className="text-4xl sm:text-5xl font-serif font-bold mb-4">Networks of Provenance & Collectors</h1>
                <p className="text-sm sm:text-base text-neutral-600 dark:text-neutral-400 font-sans">
                  Art history is a network. Explore how painters, aristocrats, merchant guilds, and museums form interconnected transaction nodes.
                </p>
              </div>

              <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 items-center">
                <div className="lg:col-span-8 bg-white dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-800 rounded-2xl overflow-hidden p-4 shadow-2xl">
                  <canvas ref={canvasRef} width={800} height={500} onClick={handleCanvasClick} className="w-full h-auto cursor-pointer" />
                </div>
                <div className="lg:col-span-4">
                  {selectedNode ? (
                    <div className="bg-white dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-800 rounded-2xl p-6 shadow-xl">
                      <span className="text-[10px] font-mono font-bold px-2 py-0.5 rounded bg-emerald-500/10 text-emerald-500 uppercase">{selectedNode.type}</span>
                      <h2 className="text-xl font-serif font-bold mt-2">{selectedNode.name}</h2>
                      <p className="text-xs text-neutral-500 font-mono mb-4">Year: {selectedNode.year} • {selectedNode.connectionsCount} Links</p>
                      <p className="text-xs text-neutral-600 dark:text-neutral-300 font-sans">{selectedNode.details}</p>
                    </div>
                  ) : (
                    <div className="p-8 rounded-2xl border border-dashed border-neutral-300 dark:border-neutral-800 text-center text-xs font-mono text-neutral-400">
                      Click any node in the canvas network graph to view transaction history and associated archives.
                    </div>
                  )}
                </div>
              </div>
            </section>

            {/* CHAPTER 3 */}
            <section id="chapter-3" className="pt-28 pb-20 px-4 sm:px-8 max-w-7xl mx-auto min-h-screen flex flex-col justify-between">
              <div className="text-center max-w-3xl mx-auto mb-10">
                <span className="text-xs font-mono font-bold text-emerald-600 dark:text-emerald-400 uppercase tracking-widest block mb-2">CHAPTER 03</span>
                <h1 className="text-4xl sm:text-5xl font-serif font-bold mb-4">Collectors, Museums, and the Market</h1>
                <p className="text-sm sm:text-base text-neutral-600 dark:text-neutral-400 font-sans">
                  Transforming millions of sales ledgers into macro art market insights using Linked Open Data (LOD).
                </p>
              </div>

              <div className="bg-white dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-800 rounded-2xl p-6 sm:p-8 shadow-xl">
                <div className="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6 pb-6 border-b border-neutral-200 dark:border-neutral-800">
                  <h3 className="text-xl font-serif font-bold">Provenance Directory</h3>
                  <input type="text" placeholder="Search owner..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="px-4 py-2 rounded-xl bg-neutral-100 dark:bg-neutral-800 border border-neutral-300 dark:border-neutral-700 text-xs font-mono w-full sm:w-64" />
                </div>
                <div className="overflow-x-auto">
                  <table className="w-full text-left text-xs font-mono">
                    <thead>
                      <tr className="border-b border-neutral-200 dark:border-neutral-800 text-neutral-400 text-[10px]">
                        <th className="pb-3">YEAR</th>
                        <th className="pb-3">OWNER</th>
                        <th className="pb-3">LOCATION</th>
                        <th className="pb-3">TYPE</th>
                        <th className="pb-3">PRICE</th>
                        <th className="pb-3 text-right">ACTION</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-neutral-100 dark:divide-neutral-800">
                      {filteredRecords.map(r => (
                        <tr key={r.id} className="hover:bg-neutral-50 dark:hover:bg-neutral-800/40">
                          <td className="py-4 font-bold">{r.year}</td>
                          <td className="py-4 font-serif font-semibold">{r.owner}</td>
                          <td className="py-4 text-neutral-500">{r.location}</td>
                          <td className="py-4">{r.transactionType}</td>
                          <td className="py-4 text-emerald-500 font-semibold">{r.price}</td>
                          <td className="py-4 text-right">
                            <button onClick={() => setActiveLedgerRecord(r)} className="px-3 py-1.5 rounded bg-neutral-900 dark:bg-neutral-100 text-white dark:text-neutral-900 font-semibold">Inspect</button>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </section>
          </main>

          <footer className="border-t border-neutral-200 dark:border-neutral-800 py-8 px-6 text-center text-xs font-mono text-neutral-500">
            TRACING ART • GETTY PROVENANCE INDEX • © 2026 J. PAUL GETTY TRUST
          </footer>
        </div>
      );
    }

    if (window.React && window.ReactDOM) {
      setTimeout(() => {
        const rootEl = document.getElementById('root');
        if (rootEl) {
          const root = ReactDOM.createRoot(rootEl);
          root.render(React.createElement(App));
        }
      }, 200);
    }
  </script>
</body>
</html>
